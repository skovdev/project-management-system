# Application name
spring.application.name=notification-service-test

# Disable cloud config for tests
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# JPA DDL for Testcontainers-based repository tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.generate-ddl=true

# Disable Eureka for tests
eureka.client.enabled=false

# AWS mock values for tests
aws.iam.user.accessKey=test-access-key
aws.iam.user.secretKey=test-secret-key
aws.secretsmanager.secretName.project-management-system-security-private-public-keys=test-secret

# Kafka bootstrap server overridden per test
project-management-system.kafka.server=localhost:9092
project-management-system.kafka.topic.partitions=1
project-management-system.kafka.topic.replication-factor=1
