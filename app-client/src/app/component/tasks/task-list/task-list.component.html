<div class="task-list">

  <div class="page-header">
    <div class="page-header-text">
      <h1>Tasks</h1>
      <p class="page-subtitle">View and manage all your tasks</p>
    </div>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon> New Task
    </button>
  </div>

  <div *ngIf="loading" class="loading-center">
    <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
  </div>

  <ng-container *ngIf="!loading">

    <mat-card *ngIf="tasks.length > 0" class="table-card">
      <table mat-table [dataSource]="tasks" class="tasks-table">

        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Title</th>
          <td mat-cell *matCellDef="let t" class="cell-title">{{ t.title }}</td>
        </ng-container>

        <ng-container matColumnDef="priority">
          <th mat-header-cell *matHeaderCellDef>Priority</th>
          <td mat-cell *matCellDef="let t">
            <span class="priority-badge priority-{{ t.taskPriorityType | lowercase }}">
              {{ t.taskPriorityType }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let t">
            <span class="status-badge status-{{ t.taskStatusType | lowercase }}">
              {{ t.taskStatusType }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="active">
          <th mat-header-cell *matHeaderCellDef>Active</th>
          <td mat-cell *matCellDef="let t">
            <span class="active-badge" [class.active-badge--yes]="t.active">
              <mat-icon>{{ t.active ? 'check_circle' : 'radio_button_unchecked' }}</mat-icon>
              {{ t.active ? 'Yes' : 'No' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let t" class="cell-actions">
            <button mat-icon-button (click)="viewTask(t.id)" title="View task details"
                    aria-label="View task details">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button color="primary" (click)="openEditDialog(t)" title="Edit task"
                    aria-label="Edit task">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteTask(t.id)" title="Delete task"
                    aria-label="Delete task">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageSizeOptions]="[5, 10, 20]"
        (page)="onPageChange($event)"
        aria-label="Select page">
      </mat-paginator>
    </mat-card>

    <div *ngIf="tasks.length === 0" class="empty-state">
      <mat-icon class="empty-icon">task_alt</mat-icon>
      <h3 class="empty-title">No tasks yet</h3>
      <p class="empty-desc">Get started by creating your first task.</p>
      <button mat-raised-button color="primary" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon> Create Task
      </button>
    </div>

  </ng-container>
</div>
