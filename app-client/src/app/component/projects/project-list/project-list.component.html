<div class="project-list">

  <div class="page-header">
    <div class="page-header-text">
      <h1>Projects</h1>
      <p class="page-subtitle">Manage and track all your projects</p>
    </div>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon> New Project
    </button>
  </div>

  <div *ngIf="loading" class="loading-center">
    <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
  </div>

  <ng-container *ngIf="!loading">

    <mat-card *ngIf="projects.length > 0" class="table-card">
      <table mat-table [dataSource]="projects" class="projects-table">

        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Title</th>
          <td mat-cell *matCellDef="let p" class="cell-title">{{ p.title }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let p">
            <span class="status-badge status-{{ p.projectStatusType | lowercase }}">
              {{ p.projectStatusType }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="startDate">
          <th mat-header-cell *matHeaderCellDef>Start</th>
          <td mat-cell *matCellDef="let p" class="cell-date">{{ p.startDate | date:'mediumDate' }}</td>
        </ng-container>

        <ng-container matColumnDef="endDate">
          <th mat-header-cell *matHeaderCellDef>End</th>
          <td mat-cell *matCellDef="let p" class="cell-date">{{ p.endDate | date:'mediumDate' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let p" class="cell-actions">
            <button mat-icon-button color="primary" (click)="openEditDialog(p)" title="Edit project"
                    aria-label="Edit project">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteProject(p.id)" title="Delete project"
                    aria-label="Delete project">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageSizeOptions]="[5, 10, 20]"
        (page)="onPageChange($event)"
        aria-label="Select page">
      </mat-paginator>
    </mat-card>

    <div *ngIf="projects.length === 0" class="empty-state">
      <mat-icon class="empty-icon">folder_open</mat-icon>
      <h3 class="empty-title">No projects yet</h3>
      <p class="empty-desc">Get started by creating your first project.</p>
      <button mat-raised-button color="primary" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon> Create Project
      </button>
    </div>

  </ng-container>
</div>
