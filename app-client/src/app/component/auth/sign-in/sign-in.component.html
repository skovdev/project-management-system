<div class="auth-container">
  <mat-card class="auth-card">

    <div class="auth-brand">
      <div class="auth-brand-icon">&#9889;</div>
      <span class="auth-brand-name">PMS</span>
    </div>

    <mat-card-title>Welcome back</mat-card-title>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <mat-card-content>
      <form [formGroup]="signInForm" (ngSubmit)="onSubmit()" class="auth-form">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-error *ngIf="signInForm.get('username')?.hasError('required')">
            Username is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-error *ngIf="signInForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          class="auth-submit-btn"
          type="submit"
          [disabled]="signInForm.invalid || loading">
          <mat-spinner *ngIf="loading" [diameter]="18" style="display:inline-block;margin-right:8px"></mat-spinner>
          Sign In
        </button>

      </form>

      <div class="auth-switch">
        <span>Don't have an account?</span>
        <a routerLink="/sign-up" class="auth-switch-link">Sign up</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
