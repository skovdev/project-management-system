<div class="auth-container">
  <mat-card class="auth-card">

    <div class="auth-brand">
      <div class="auth-brand-icon">&#9889;</div>
      <span class="auth-brand-name">PMS</span>
    </div>

    <mat-card-title>Create your account</mat-card-title>
    <p class="auth-subtitle">Get started for free today</p>

    <mat-card-content>
      <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()" class="auth-form">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" />
          <mat-error *ngIf="signUpForm.get('username')?.hasError('required')">Username is required</mat-error>
          <mat-error *ngIf="signUpForm.get('username')?.hasError('minlength')">Min 4 characters</mat-error>
        </mat-form-field>

        <div class="form-row">
          <mat-form-field appearance="outline" class="flex-field">
            <mat-label>First Name</mat-label>
            <input matInput formControlName="firstName" autocomplete="given-name" />
            <mat-error *ngIf="signUpForm.get('firstName')?.hasError('required')">Required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="flex-field">
            <mat-label>Last Name</mat-label>
            <input matInput formControlName="lastName" autocomplete="family-name" />
            <mat-error *ngIf="signUpForm.get('lastName')?.hasError('required')">Required</mat-error>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" />
          <mat-error *ngIf="signUpForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="signUpForm.get('email')?.hasError('email')">Invalid email format</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="new-password" />
          <mat-error *ngIf="signUpForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="signUpForm.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          class="auth-submit-btn"
          type="submit"
          [disabled]="signUpForm.invalid || loading">
          <mat-spinner *ngIf="loading" [diameter]="18" style="display:inline-block;margin-right:8px"></mat-spinner>
          Create Account
        </button>

      </form>

      <div class="auth-switch">
        <span>Already have an account?</span>
        <a routerLink="/sign-in" class="auth-switch-link">Sign in</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
