<mat-sidenav-container class="shell-container">

  <mat-sidenav
    [mode]="sidenavMode"
    [opened]="sidenavOpened"
    class="shell-sidenav"
    (closedStart)="sidenavOpened = false">

    <!-- Brand -->
    <div class="sidenav-brand">
      <div class="brand-icon">
        <mat-icon>rocket_launch</mat-icon>
      </div>
      <span class="brand-name">PMS</span>
    </div>

    <!-- Navigation -->
    <nav class="sidenav-nav" aria-label="Main navigation">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="nav-item--active"
         (click)="closeSidenavOnMobile()" aria-label="Dashboard">
        <mat-icon class="nav-icon">dashboard</mat-icon>
        <span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/projects" routerLinkActive="nav-item--active"
         (click)="closeSidenavOnMobile()" aria-label="Projects">
        <mat-icon class="nav-icon">folder_open</mat-icon>
        <span class="nav-label">Projects</span>
      </a>
      <a class="nav-item" routerLink="/tasks" routerLinkActive="nav-item--active"
         (click)="closeSidenavOnMobile()" aria-label="Tasks">
        <mat-icon class="nav-icon">task_alt</mat-icon>
        <span class="nav-label">Tasks</span>
      </a>
      <a class="nav-item" routerLink="/notifications" routerLinkActive="nav-item--active"
         (click)="closeSidenavOnMobile()" aria-label="Notifications">
        <mat-icon class="nav-icon">notifications_none</mat-icon>
        <span class="nav-label">Notifications</span>
      </a>
      <a class="nav-item" routerLink="/profile" routerLinkActive="nav-item--active"
         (click)="closeSidenavOnMobile()" aria-label="Profile">
        <mat-icon class="nav-icon">person_outline</mat-icon>
        <span class="nav-label">Profile</span>
      </a>
    </nav>

    <!-- User footer -->
    <div class="sidenav-footer">
      <div class="user-avatar" aria-hidden="true">{{ initials }}</div>
      <div class="footer-user-info">
        <span class="footer-username">{{ username }}</span>
        <span class="footer-role">Member</span>
      </div>
      <button mat-icon-button (click)="logout()" class="logout-btn" title="Logout" aria-label="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <header class="shell-header">
      <button mat-icon-button class="menu-toggle" (click)="toggleSidenav()" aria-label="Toggle navigation">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="header-app-name">Project Management System</span>
      <span class="header-spacer"></span>

      <!-- Notification bell -->
      <button mat-icon-button class="notif-btn"
              [matBadge]="unreadCount"
              [matBadgeHidden]="unreadCount === 0"
              matBadgeColor="warn"
              matBadgeSize="small"
              [matMenuTriggerFor]="notifMenu"
              aria-label="Open notifications">
        <mat-icon>notifications_none</mat-icon>
      </button>

      <mat-menu #notifMenu="matMenu" class="notif-menu" xPosition="before">
        <div class="notif-menu-header" (click)="$event.stopPropagation()">
          <span class="notif-menu-title">Notifications</span>
          <a class="notif-menu-viewall" routerLink="/notifications">View all</a>
        </div>

        <ng-container *ngIf="unreadNotifications.length > 0; else noNotif">
          <button mat-menu-item *ngFor="let n of unreadNotifications" class="notif-menu-item"
                  (click)="onNotifClick(n)">
            <div class="notif-item-content">
              <span class="notif-item-title">{{ n.title }}</span>
              <span class="notif-item-msg">{{ n.message }}</span>
              <span class="notif-item-date">{{ n.createdAt | date:'dd MMM, HH:mm' }}</span>
            </div>
          </button>
        </ng-container>

        <ng-template #noNotif>
          <div class="notif-empty" (click)="$event.stopPropagation()">
            <mat-icon>notifications_none</mat-icon>
            <span>No new notifications</span>
          </div>
        </ng-template>
      </mat-menu>
    </header>

    <main class="shell-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
