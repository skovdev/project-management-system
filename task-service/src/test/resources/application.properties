# Disable Spring Cloud Config Server import check
spring.config.import=optional:configserver:
spring.cloud.config.import-check.enabled=false
spring.cloud.config.enabled=false

# Disable Eureka
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# JPA - Testcontainers provides the datasource via @ServiceConnection
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# AWS - dummy values; real client won't be called (mocked in tests)
aws.iam.user.accessKey=test-access-key
aws.iam.user.secretKey=test-secret-key
aws.secretsmanager.secretName.project-management-system-security-private-public-keys=test-secret

# Kafka - disable auto-configuration for slice/unit tests
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude=\
  org.springframework.cloud.stream.config.BindingServiceConfiguration,\
  org.springframework.cloud.stream.function.FunctionConfiguration
