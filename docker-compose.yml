services:
  postgresql:
    image: postgresql-db
    deploy:
        replicas: 1
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: postgres -c max_connections=170 -c superuser_reserved_connections=5
    ports:
      - "5432:5432"
    networks:
      - project-management-system-network

  app-client:
    image: app-client-1.0
    deploy:
      replicas: 1
    ports:
      - target: 4200
        published: 4200
        protocol: tcp
        mode: host
    networks:
      - project-management-system-network

  service-discovery:
    image: service-discovery-1.0
    deploy:
      replicas: 1
    ports:
      - "8761:8761"
    networks:
      - project-management-system-network

  config-server:
    image: config-server-1.0
    deploy:
      replicas: 1
    ports:
      - "8888:8888"
    networks:
      - project-management-system-network

  api-gateway:
    image: api-gateway-1.0
    deploy:
      replicas: 1
    environment:
      CONFIG_SERVER_HOST: config-server
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - target: 8762
        published: 8762
        protocol: tcp
        mode: host
    entrypoint: ../wait-for-it.sh config-server:8888 --timeout=20 -- java -jar api-gateway-1.0.jar
    networks:
      - project-management-system-network

  auth-service:
    image: auth-service-1.0
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
    environment:
      CONFIG_SERVER_HOST: config-server
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "60000"
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "240000"
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
      SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD: "5000"
      SPRING_SQL_INIT_MODE: always
      SPRING_SQL_INIT_DATA_LOCATIONS: file:/app/db/seed_test_data.sql
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006"
    ports:
      - target: 5006
        published: 5006
        protocol: tcp
        mode: host
    volumes:
      - ./auth-service/db/seed_test_data.sql:/app/db/seed_test_data.sql:ro
    entrypoint: ../wait-for-it.sh config-server:8888 --timeout=20 -- java -jar auth-service-1.0.jar
    networks:
      - project-management-system-network

  user-service:
    image: user-service-1.0
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
    environment:
      CONFIG_SERVER_HOST: config-server
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "60000"
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "240000"
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
      SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD: "5000"
      SPRING_SQL_INIT_MODE: always
      SPRING_SQL_INIT_DATA_LOCATIONS: file:/app/db/seed_test_data.sql
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    volumes:
      - ./user-service/db/seed_test_data.sql:/app/db/seed_test_data.sql:ro
    entrypoint: ../wait-for-it.sh config-server:8888 --timeout=20 -- java -jar user-service-1.0.jar
    networks:
      - project-management-system-network

  project-service:
    image: project-service-1.0
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
    environment:
      CONFIG_SERVER_HOST: config-server
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "60000"
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "240000"
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
      SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD: "5000"
      SPRING_SQL_INIT_MODE: always
      SPRING_SQL_INIT_DATA_LOCATIONS: file:/app/db/seed_test_data.sql
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    volumes:
      - ./project-service/db/seed_test_data.sql:/app/db/seed_test_data.sql:ro
    entrypoint: ../wait-for-it.sh config-server:8888 --timeout=20 -- java -jar project-service-1.0.jar
    networks:
      - project-management-system-network

  task-service:
    image: task-service-1.0
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
    environment:
      CONFIG_SERVER_HOST: config-server
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "60000"
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "240000"
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
      SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD: "5000"
      SPRING_SQL_INIT_MODE: always
      SPRING_SQL_INIT_DATA_LOCATIONS: file:/app/db/seed_test_data.sql
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    volumes:
      - ./task-service/db/seed_test_data.sql:/app/db/seed_test_data.sql:ro
    entrypoint: ../wait-for-it.sh config-server:8888 --timeout=20 -- java -jar task-service-1.0.jar
    networks:
      - project-management-system-network

  ai-service:
    image: ai-service-1.0
    deploy:
      replicas: 3
    environment:
      CONFIG_SERVER_HOST: config-server
      SPRING_PROFILES_ACTIVE: docker
    entrypoint: ../wait-for-it.sh config-server:8888 --timeout=20 -- java -jar ai-service-1.0.jar
    networks:
      - project-management-system-network

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    deploy:
      replicas: 1
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - project-management-system-network

networks:
  project-management-system-network:
    driver: overlay
